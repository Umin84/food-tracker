<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Tracker"/>
<title>Food Tracker</title>
<style>
html,body{margin:0;padding:0;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#1c1c1e}
*{box-sizing:border-box}
#app{max-width:430px;margin:0 auto;padding:16px 16px 40px}
h1{font-size:28px;font-weight:700;margin:12px 0 4px;color:#1c1c1e}
.date{font-size:13px;color:#8e8e93;margin-bottom:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px}
.ring-row{display:flex;align-items:center;gap:16px}
.ring-text .cal{font-size:32px;font-weight:700;color:#1c1c1e;line-height:1}
.ring-text .cal span{font-size:17px;font-weight:400;color:#8e8e93}
.ring-text .sub{font-size:13px;color:#8e8e93;margin-top:4px}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.mc{background:#fff;border-radius:14px;padding:10px 8px 12px}
.mc .lbl{font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.mc .val{font-size:20px;font-weight:700;color:#1c1c1e;line-height:1}
.mc .val span{font-size:11px;font-weight:400;color:#8e8e93}
.mc .goal{font-size:10px;color:#c7c7cc;margin-top:2px}
.bar-track{height:3px;background:#e5e5ea;border-radius:2px;margin-top:7px}
.bar-fill{height:3px;border-radius:2px;transition:width .4s ease}
.sec-label{font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
input[type=text],input[type=number],select{-webkit-appearance:none;appearance:none;background:#f2f2f7;border:none;border-radius:10px;height:44px;font-size:17px;padding:0 12px;color:#1c1c1e;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:none;background:#e8e8ed}
.input-wrap{position:relative;margin-bottom:8px}
.ac-drop{display:none;position:absolute;top:46px;left:0;right:0;background:#fff;border-radius:12px;z-index:99;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ac-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;font-size:15px;color:#1c1c1e;border-bottom:1px solid #f2f2f7;cursor:pointer}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:#f2f2f7}
.ac-meta{font-size:12px;color:#8e8e93}
.bottom-row{display:flex;gap:8px}
.bottom-row input[type=number]{width:90px;flex:none}
.bottom-row select{flex:1}
.log-btn{height:44px;background:#30d158;color:#fff;font-size:17px;font-weight:600;border:none;border-radius:10px;padding:0 20px;cursor:pointer;white-space:nowrap;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent}
.log-btn:active{opacity:.8}
.scan-row{display:flex;gap:8px;margin-bottom:8px}
.scan-btn{flex:1;height:44px;background:#f2f2f7;color:#1c1c1e;font-size:15px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.scan-btn:active{opacity:.7}
.entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f2f2f7}
.entry:last-child{border-bottom:none}
.entry-name{flex:1;font-size:15px;font-weight:500;color:#1c1c1e}
.entry-amt{font-size:13px;color:#8e8e93;white-space:nowrap}
.entry-cal{font-size:13px;color:#8e8e93;text-align:right;min-width:70px;white-space:nowrap}
.entry-del{background:none;border:none;font-size:22px;color:#c7c7cc;padding:0 2px;cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent}
.entry-del:active{color:#ff3b30}
.empty{font-size:15px;color:#c7c7cc;text-align:center;padding:16px 0;font-style:italic}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;color:#1c1c1e}
.modal-sub{font-size:13px;color:#8e8e93;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.modal-field input{width:100%;height:44px;font-size:17px;background:#f2f2f7;border:none;border-radius:10px;padding:0 12px;color:#1c1c1e;-webkit-appearance:none;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-primary{flex:1;height:44px;background:#30d158;color:#fff;font-size:17px;font-weight:600;border:none;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.btn-secondary{flex:1;height:44px;background:#f2f2f7;color:#1c1c1e;font-size:17px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.spinner{text-align:center;padding:24px;font-size:14px;color:#8e8e93}
.food-preview{background:#f2f2f7;border-radius:12px;padding:12px 14px;margin-bottom:12px}
.food-preview .fname{font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:4px}
.food-preview .fmacros{font-size:13px;color:#8e8e93}
#video-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:12px;background:#000}
#scanner-video{width:100%;display:block;border-radius:12px}
.scan-line{position:absolute;top:50%;left:10%;right:10%;height:2px;background:#30d158;box-shadow:0 0 8px #30d158;animation:scanline 2s ease-in-out infinite}
@keyframes scanline{0%,100%{top:30%}50%{top:70%}}
.file-upload-btn{width:100%;height:44px;background:#f2f2f7;border:none;border-radius:10px;font-size:15px;color:#1c1c1e;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">
<h1>Today</h1>
<div class="date" id="day-date"></div>
<div class="card">
<div class="ring-row">
<svg width="68" height="68" viewBox="0 0 68 68">
<circle cx="34" cy="34" r="28" fill="none" stroke-width="6" stroke="#e5e5ea"/>
<circle id="ring-arc" cx="34" cy="34" r="28" fill="none" stroke-width="6" stroke="#30d158" stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9" transform="rotate(-90 34 34)" style="transition:stroke-dashoffset .5s"/>
</svg>
<div class="ring-text">
<div class="cal"><span id="ring-cal">0</span><span> kcal</span></div>
<div class="sub">of 2000 goal &middot; <span id="ring-rem">2000</span> left</div>
</div>
</div>
</div>
<div class="macro-grid">
<div class="mc"><div class="lbl">Protein</div><div class="val"><span id="m-protein">0</span><span>g</span></div><div class="goal">/ 150g</div><div class="bar-track"><div class="bar-fill" id="b-protein" style="background:#30d158;width:0%"></div></div></div>
<div class="mc"><div class="lbl">Carbs</div><div class="val"><span id="m-carbs">0</span><span>g</span></div><div class="goal">/ 250g</div><div class="bar-track"><div class="bar-fill" id="b-carbs" style="background:#0a84ff;width:0%"></div></div></div>
<div class="mc"><div class="lbl">Fat</div><div class="val"><span id="m-fat">0</span><span>g</span></div><div class="goal">/ 65g</div><div class="bar-track"><div class="bar-fill" id="b-fat" style="background:#ff9f0a;width:0%"></div></div></div>
<div class="mc"><div class="lbl">Fiber</div><div class="val"><span id="m-fiber">0</span><span>g</span></div><div class="goal">/ 30g</div><div class="bar-track"><div class="bar-fill" id="b-fiber" style="background:#bf5af2;width:0%"></div></div></div>
</div>
<div class="card">
<div class="sec-label">Log food</div>
<div class="scan-row">
<button class="scan-btn" id="barcode-btn">📷 Scan Barcode</button>
<button class="scan-btn" id="label-btn">🏷️ Scan Label</button>
</div>
<div class="input-wrap">
<input id="food-name" type="text" placeholder="Or type food name…" autocomplete="off" autocorrect="off" spellcheck="false"/>
<div class="ac-drop" id="ac-drop"></div>
</div>
