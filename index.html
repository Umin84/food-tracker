<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Food Tracker"/>
<title>Food Tracker</title>
<style>
html,body{margin:0;padding:0;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#1c1c1e}
*{box-sizing:border-box}
#app{max-width:430px;margin:0 auto;padding:16px 16px 40px}
h1{font-size:28px;font-weight:700;margin:12px 0 4px;color:#1c1c1e}
.date{font-size:13px;color:#8e8e93;margin-bottom:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px}
.ring-row{display:flex;align-items:center;gap:16px}
.ring-text .cal{font-size:32px;font-weight:700;color:#1c1c1e;line-height:1}
.ring-text .cal span{font-size:17px;font-weight:400;color:#8e8e93}
.ring-text .sub{font-size:13px;color:#8e8e93;margin-top:4px}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.mc{background:#fff;border-radius:14px;padding:10px 8px 12px}
.mc .lbl{font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.mc .val{font-size:20px;font-weight:700;color:#1c1c1e;line-height:1}
.mc .val span{font-size:11px;font-weight:400;color:#8e8e93}
.mc .goal{font-size:10px;color:#c7c7cc;margin-top:2px}
.bar-track{height:3px;background:#e5e5ea;border-radius:2px;margin-top:7px}
.bar-fill{height:3px;border-radius:2px;transition:width .4s ease}
.sec-label{font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
input[type=text],input[type=number],select{-webkit-appearance:none;appearance:none;background:#f2f2f7;border:none;border-radius:10px;height:44px;font-size:17px;padding:0 12px;color:#1c1c1e;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:none;background:#e8e8ed}
.input-wrap{position:relative;margin-bottom:8px}
.ac-drop{display:none;position:absolute;top:46px;left:0;right:0;background:#fff;border-radius:12px;z-index:99;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ac-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;font-size:15px;color:#1c1c1e;border-bottom:1px solid #f2f2f7;cursor:pointer}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:#f2f2f7}
.ac-meta{font-size:12px;color:#8e8e93}
.bottom-row{display:flex;gap:8px}
.bottom-row input[type=number]{width:90px;flex:none}
.bottom-row select{flex:1}
.log-btn{height:44px;background:#30d158;color:#fff;font-size:17px;font-weight:600;border:none;border-radius:10px;padding:0 20px;cursor:pointer;white-space:nowrap;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent}
.log-btn:active{opacity:.8}
.scan-row{display:flex;gap:8px;margin-bottom:8px}
.scan-btn{flex:1;height:44px;background:#f2f2f7;color:#1c1c1e;font-size:15px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent}
.scan-btn:active{opacity:.7}
.entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f2f2f7}
.entry:last-child{border-bottom:none}
.entry-name{flex:1;font-size:15px;font-weight:500;color:#1c1c1e}
.entry-amt{font-size:13px;color:#8e8e93;white-space:nowrap}
.entry-cal{font-size:13px;color:#8e8e93;text-align:right;min-width:70px;white-space:nowrap}
.entry-del{background:none;border:none;font-size:22px;color:#c7c7cc;padding:0 2px;cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent}
.entry-del:active{color:#ff3b30}
.empty{font-size:15px;color:#c7c7cc;text-align:center;padding:16px 0;font-style:italic}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;color:#1c1c1e}
.modal-sub{font-size:13px;color:#8e8e93;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;height:44px;font-size:17px;background:#f2f2f7;border:none;border-radius:10px;padding:0 12px;color:#1c1c1e;-webkit-appearance:none;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-primary{flex:1;height:44px;background:#30d158;color:#fff;font-size:17px;font-weight:600;border:none;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.btn-secondary{flex:1;height:44px;background:#f2f2f7;color:#1c1c1e;font-size:17px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.food-preview{background:#f2f2f7;border-radius:12px;padding:12px 14px;margin-bottom:12px}
.food-preview .fname{font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:4px}
.food-preview .fmacros{font-size:13px;color:#8e8e93}
.status-msg{text-align:center;padding:20px;font-size:14px;color:#8e8e93}
.upload-btn{width:100%;height:50px;background:#f2f2f7;border:none;border-radius:12px;font-size:16px;color:#1c1c1e;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.upload-btn:active{opacity:.7}
</style>
</head>
<body>
<div id="app">
<h1>Today</h1>
<div class="date" id="day-date"></div>
<div class="card">
<div class="ring-row">
<svg width="68" height="68" viewBox="0 0 68 68">
<circle cx="34" cy="34" r="28" fill="none" stroke-width="6" stroke="#e5e5ea"/>
<circle id="ring-arc" cx="34" cy="34" r="28" fill="none" stroke-width="6" stroke="#30d158" stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9" transform="rotate(-90 34 34)" style="transition:stroke-dashoffset .5s"/>
</svg>
<div class="ring-text">
<div class="cal"><span id="ring-cal">0</span><span> kcal</span></div>
<div class="sub">of 2000 goal &middot; <span id="ring-rem">2000</span> left</div>
</div>
</div>
</div>
<div class="macro-grid">
<div class="mc"><div class="lbl">Protein</div><div class="val"><span id="m-protein">0</span><span>g</span></div><div class="goal">/ 150g</div><div class="bar-track"><div class="bar-fill" id="b-protein" style="background:#30d158;width:0%"></div></div></div>
<div class="mc"><div class="lbl">Carbs</div><div class="val"><span id="m-carbs">0</span><span>g</span></div><div class="goal">/ 250g</div><div class="bar-track"><div class="bar-fill" id="b-carbs" style="background:#0a84ff;width:0%"></div></div></div>
<div class="mc"><div class="lbl">Fat</div><div class="val"><span id="m-fat">0</span><span>g</span></div><div class="goal">/ 65g</div><div class="bar-track"><div class="bar-fill" id="b-fat" style="background:#ff9f0a;width:0%"></div></div></div>
<div class="mc"><div class="lbl">Fiber</div><div class="val"><span id="m-fiber">0</span><span>g</span></div><div class="goal">/ 30g</div><div class="bar-track"><div class="bar-fill" id="b-fiber" style="background:#bf5af2;width:0%"></div></div></div>
</div>
<div class="card">
<div class="sec-label">Log food</div>
<div class="scan-row">
<button class="scan-btn" id="barcode-btn">📷 Scan Barcode</button>
<button class="scan-btn" id="label-btn">🏷️ Scan Label</button>
</div>
<div class="input-wrap">
<input id="food-name" type="text" placeholder="Or type food name…" autocomplete="off" autocorrect="off" spellcheck="false"/>
<div class="ac-drop" id="ac-drop"></div>
</div>
<div class="bottom-row">
<input id="food-amt" type="number" placeholder="Amount" min="0" step="any" inputmode="decimal"/>
<select id="food-unit"><option value="g">g</option><option value="oz">oz</option><option value="ml">ml</option><option value="fl oz">fl oz</option><option value="cup">cup</option><option value="tbsp">tbsp</option><option value="tsp">tsp</option><option value="serving">serving</option></select>
<button class="log-btn" id="log-btn">+ Log</button>
</div>
</div>
<div class="card">
<div class="sec-label">Today's log</div>
<div id="log-list"></div>
</div>
</div>
<input type="file" id="barcode-file" accept="image/*" capture="environment" style="display:none"/>
<input type="file" id="label-file" accept="image/*" capture="environment" style="display:none"/>
<div class="modal-overlay" id="barcode-modal">
<div class="modal">
<div class="modal-title">📷 Scan Barcode</div>
<div class="modal-sub">Take a photo of the barcode on the package</div>
<div id="bc-step1"><button class="upload-btn" id="bc-photo-btn">📷 Open Camera</button></div>
<div id="bc-status" class="status-msg" style="display:none">Looking up product…</div>
<div id="bc-result" style="display:none">
<div class="food-preview"><div class="fname" id="bc-name"></div><div class="fmacros" id="bc-macros"></div></div>
<div class="modal-field"><label>Amount</label><input id="bc-amt" type="number" placeholder="100" inputmode="decimal"/></div>
<div class="modal-field"><label>Unit</label><select id="bc-unit"><option value="g">g</option><option value="oz">oz</option><option value="ml">ml</option><option value="serving">serving</option></select></div>
<div class="modal-actions"><button class="btn-primary" id="bc-log-btn">Log it</button><button class="btn-secondary" id="bc-cancel">Cancel</button></div>
</div>
<div id="bc-error" style="display:none"><div class="modal-actions" style="margin-top:0"><button class="btn-secondary" id="bc-retry">Try again</button><button class="btn-secondary" id="bc-close">Close</button></div></div>
</div>
</div>
<div class="modal-overlay" id="label-modal">
<div class="modal">
<div class="modal-title">🏷️ Scan Nutrition Label</div>
<div class="modal-sub">Take a photo of the nutrition facts label</div>
<div id="lbl-step1"><button class="upload-btn" id="lbl-photo-btn">📷 Open Camera</button></div>
<div id="lbl-status" class="status-msg" style="display:none">Reading label…</div>
<div id="lbl-result" style="display:none">
<div class="food-preview"><div class="fname" id="lbl-name-preview"></div><div class="fmacros" id="lbl-macros-preview"></div></div>
<div class="modal-field"><label>Food name</label><input id="lbl-name" type="text"/></div>
<div class="modal-field"><label>Calories</label><input id="lbl-cal" type="number" inputmode="decimal"/></div>
<div class="modal-field"><label>Protein (g)</label><input id="lbl-protein" type="number" inputmode="decimal"/></div>
<div class="modal-field"><label>Carbs (g)</label><input id="lbl-carbs" type="number" inputmode="decimal"/></div>
<div class="modal-field"><label>Fat (g)</label><input id="lbl-fat" type="number" inputmode="decimal"/></div>
<div class="modal-field"><label>Amount to log</label><input id="lbl-amt" type="number" placeholder="100" inputmode="decimal"/></div>
<div class="modal-field"><label>Unit</label><select id="lbl-unit"><option value="g">g</option><option value="oz">oz</option><option value="ml">ml</option><option value="serving">serving</option></select></div>
<div class="modal-actions"><button class="btn-primary" id="lbl-log-btn">Log it</button><button class="btn-secondary" id="lbl-cancel">Cancel</button></div>
</div>
<div id="lbl-error" style="display:none"><div class="modal-actions" style="margin-top:0"><button class="btn-secondary" id="lbl-retry">Try again</button><button class="btn-secondary" id="lbl-close">Close</button></div></div>
</div>
</div>
<script>
var GOALS={cal:2000,protein:150,carbs:250,fat:65,fiber:30};
var UNIT_G={g:1,oz:28.3495,ml:1,'fl oz':29.5735,cup:240,tbsp:15,tsp:5,serving:null};
var FOODS=[{name:'Chicken',aliases:['grilled chicken','chicken breast'],per:100,unit:'g',cal:165,protein:31,carbs:0,fat:3.6,fiber:0},{name:'Chicken thigh',aliases:['thigh'],per:100,unit:'g',cal:209,protein:26,carbs:0,fat:11,fiber:0},{name:'Ground beef',aliases:['beef','hamburger','mince'],per:100,unit:'g',cal:215,protein:26,carbs:0,fat:13,fiber:0},{name:'Steak',aliases:['ribeye'],per:100,unit:'g',cal:291,protein:24,carbs:0,fat:22,fiber:0},{name:'Turkey',aliases:['turkey breast'],per:100,unit:'g',cal:135,protein:30,carbs:0,fat:1,fiber:0},{name:'Salmon',aliases:['fish'],per:100,unit:'g',cal:208,protein:20,carbs:0,fat:13,fiber:0},{name:'Tuna',aliases:['tuna can','canned tuna'],per:100,unit:'g',cal:116,protein:26,carbs:0,fat:1,fiber:0},{name:'Shrimp',aliases:['prawns'],per:100,unit:'g',cal:99,protein:24,carbs:0.2,fat:0.3,fiber:0},{name:'Egg',aliases:['eggs'],per:1,unit:'serving',cal:78,protein:6,carbs:0.6,fat:5,fiber:0},{name:'Egg white',aliases:['whites'],per:1,unit:'serving',cal:17,protein:3.6,carbs:0.2,fat:0,fiber:0},{name:'Greek yogurt',aliases:['yogurt','yoghurt'],per:100,unit:'g',cal:59,protein:10,carbs:3.6,fat:0.4,fiber:0},{name:'Cottage cheese',aliases:['cottage'],per:100,unit:'g',cal:98,protein:11,carbs:3.4,fat:4.3,fiber:0},{name:'Cheddar',aliases:['cheese'],per:100,unit:'g',cal:403,protein:25,carbs:1.3,fat:33,fiber:0},{name:'Milk',aliases:['whole milk'],per:100,unit:'ml',cal:61,protein:3.2,carbs:4.8,fat:3.3,fiber:0},{name:'Almond milk',aliases:[],per:100,unit:'ml',cal:17,protein:0.6,carbs:1.5,fat:1.1,fiber:0.3},{name:'Whey protein',aliases:['whey','protein powder','protein'],per:30,unit:'g',cal:120,protein:24,carbs:3,fat:2,fiber:0},{name:'Oats',aliases:['oatmeal','oat'],per:100,unit:'g',cal:389,protein:17,carbs:66,fat:7,fiber:10},{name:'White rice',aliases:['rice'],per:100,unit:'g',cal:130,protein:2.7,carbs:28,fat:0.3,fiber:0.4},{name:'Brown rice',aliases:[],per:100,unit:'g',cal:112,protein:2.6,carbs:23,fat:0.9,fiber:1.8},{name:'Pasta',aliases:['noodles','spaghetti'],per:100,unit:'g',cal:131,protein:5,carbs:25,fat:1.1,fiber:1.8},{name:'Sweet potato',aliases:['yam'],per:100,unit:'g',cal:86,protein:1.6,carbs:20,fat:0.1,fiber:3},{name:'Potato',aliases:['potatoes'],per:100,unit:'g',cal:93,protein:2.5,carbs:21,fat:0.1,fiber:2.2},{name:'Bread',aliases:['whole wheat','toast'],per:100,unit:'g',cal:247,protein:13,carbs:41,fat:3.4,fiber:7},{name:'White bread',aliases:[],per:100,unit:'g',cal:265,protein:9,carbs:49,fat:3.2,fiber:2.7},{name:'Tortilla',aliases:['wrap'],per:1,unit:'serving',cal:146,protein:4,carbs:24,fat:4,fiber:1.5},{name:'Broccoli',aliases:[],per:100,unit:'g',cal:34,protein:2.8,carbs:7,fat:0.4,fiber:2.6},{name:'Spinach',aliases:[],per:100,unit:'g',cal:23,protein:2.9,carbs:3.6,fat:0.4,fiber:2.2},{name:'Avocado',aliases:['avo'],per:100,unit:'g',cal:160,protein:2,carbs:9,fat:15,fiber:6.7},{name:'Banana',aliases:[],per:1,unit:'serving',cal:89,protein:1.1,carbs:23,fat:0.3,fiber:2.6},{name:'Apple',aliases:[],per:1,unit:'serving',cal:95,protein:0.5,carbs:25,fat:0.3,fiber:4.4},{name:'Blueberries',aliases:['blueberry'],per:100,unit:'g',cal:57,protein:0.7,carbs:14,fat:0.3,fiber:2.4},{name:'Strawberries',aliases:['strawberry'],per:100,unit:'g',cal:32,protein:0.7,carbs:7.7,fat:0.3,fiber:2},{name:'Almonds',aliases:['almond'],per:100,unit:'g',cal:579,protein:21,carbs:22,fat:50,fiber:12.5},{name:'Peanut butter',aliases:['pb','peanut'],per:100,unit:'g',cal:588,protein:25,carbs:20,fat:50,fiber:6},{name:'Olive oil',aliases:['oil'],per:100,unit:'ml',cal:884,protein:0,carbs:0,fat:100,fiber:0},{name:'Coffee',aliases:[],per:240,unit:'ml',cal:5,protein:0.3,carbs:0,fat:0,fiber:0},{name:'Black beans',aliases:['beans'],per:100,unit:'g',cal:132,protein:8.9,carbs:24,fat:0.5,fiber:8.7},{name:'Lentils',aliases:['lentil'],per:100,unit:'g',cal:116,protein:9,carbs:20,fat:0.4,fiber:7.9},{name:'Orange',aliases:[],per:1,unit:'serving',cal:62,protein:1.2,carbs:15,fat:0.2,fiber:3.1}];
var library=JSON.parse(localStorage.getItem('ft_lib6')||'null');
if(!library){library=FOODS.map(function(f,i){return Object.assign({},f,{id:'b'+i});});}
var userHistory=JSON.parse(localStorage.getItem('ft_uh6')||'[]');
var log=JSON.parse(localStorage.getItem('ft_log_'+tod())||'[]');
var nextId=Date.now();var acMatches=[];var pendingFood=null;
function tod(){return new Date().toISOString().slice(0,10);}
function save(){localStorage.setItem('ft_lib6',JSON.stringify(library));localStorage.setItem('ft_uh6',JSON.stringify(userHistory));localStorage.setItem('ft_log_'+tod(),JSON.stringify(log));}
function fuzzyMatch(food,q){var lq=q.toLowerCase();if(food.name.toLowerCase().indexOf(lq)!==-1)return true;if(food.aliases){for(var i=0;i<food.aliases.length;i++){if(food.aliases[i].indexOf(lq)!==-1)return true;}}return false;}
function getMatches(q){if(!q){return userHistory.slice(0,4).concat(library.slice(0,3)).slice(0,6);}var lib=library.filter(function(f){return fuzzyMatch(f,q);});var hist=userHistory.filter(function(h){return fuzzyMatch(h,q)&&!lib.find(function(f){return f.name.toLowerCase()===h.name.toLowerCase();});});return lib.concat(hist).slice(0,7);}
var nameEl=document.getElementById('food-name');var amtEl=document.getElementById('food-amt');var unitEl=document.getElementById('food-unit');var acDrop=document.getElementById('ac-drop');
function renderAC(){var q=nameEl.value.trim();acMatches=getMatches(q);if(!acMatches.length){acDrop.style.display='none';return;}acDrop.innerHTML='';acMatches.forEach(function(f){var d=document.createElement('div');d.className='ac-item';d.innerHTML='<span>'+f.name+'</span><span class="ac-meta">'+f.cal+' kcal/'+f.per+f.unit+'</span>';d.addEventListener('touchstart',function(e){e.preventDefault();pickFood(f);},{passive:false});d.addEventListener('mousedown',function(e){e.preventDefault();pickFood(f);});acDrop.appendChild(d);});acDrop.style.display='block';}
function pickFood(f){nameEl.value=f.name;nameEl.dataset.picked=f.id||f.name;unitEl.value=(f.unit==='serving')?'serving':'g';acDrop.style.display='none';amtEl.focus();}
nameEl.addEventListener('input',function(){nameEl.dataset.picked='';renderAC();});
nameEl.addEventListener('focus',function(){renderAC();});
document.addEventListener('click',function(e){if(!acDrop.contains(e.target)&&e.target!==nameEl)acDrop.style.display='none';});
function calcN(food,amt,unit){var ratio;if(unit==='serving'||food.unit==='serving'){ratio=amt;}else{var ag=amt*(UNIT_G[unit]||1);var bg=food.per*(UNIT_G[food.unit]||1);ratio=ag/bg;}return{cal:food.cal*ratio,protein:food.protein*ratio,carbs:food.carbs*ratio,fat:food.fat*ratio,fiber:(food.fiber||0)*ratio};}
function addToLog(name,amt,unit,food){var n={cal:0,protein:0,carbs:0,fat:0,fiber:0};if(food)n=calcN(food,amt,unit);if(!food){var nf={id:'u'+Date.now(),name:name,aliases:[name.toLowerCase()],per:100,unit:'g',cal:0,protein:0,carbs:0,fat:0,fiber:0,custom:true};userHistory.unshift(nf);}else{userHistory=userHistory.filter(function(h){return h.name.toLowerCase()!==name.toLowerCase();});userHistory.unshift(Object.assign({},food,{lastUsed:Date.now()}));}if(userHistory.length>200)userHistory=userHistory.slice(0,200);log.push({id:nextId++,name:name,amt:amt,unit:unit,cal:n.cal,protein:n.protein,carbs:n.carbs,fat:n.fat,fiber:n.fiber});save();renderLog();renderMacros();}
function logFood(){var name=nameEl.value.trim();var amt=parseFloat(amtEl.value);var unit=unitEl.value;if(!name){nameEl.focus();return;}if(!amt||amt<=0){amtEl.focus();return;}var food=null;var picked=nameEl.dataset.picked;if(picked){food=library.find(function(f){return f.id===picked;})||userHistory.find(function(f){return f.name===picked;});}if(!food){food=library.find(function(f){return f.name.toLowerCase()===name.toLowerCase();})||userHistory.find(function(f){return f.name.toLowerCase()===name.toLowerCase();});}if(!food){var m=getMatches(name);if(m.length)food=m[0];}addToLog(name,amt,unit,food);nameEl.value='';amtEl.value='';nameEl.dataset.picked='';acDrop.style.display='none';nameEl.focus();}
document.getElementById('log-btn').addEventListener('click',logFood);
amtEl.addEventListener('keydown',function(e){if(e.key==='Enter')logFood();});
var barcodeModal=document.getElementById('barcode-modal');
document.getElementById('barcode-btn').addEventListener('click',function(){barcodeModal.classList.add('open');resetBcModal();});
document.getElementById('bc-photo-btn').addEventListener('click',function(){document.getElementById('barcode-file').click();});
document.getElementById('barcode-file').addEventListener('change',function(e){var file=e.target.files[0];if(!file)return;showBcStatus('Reading barcode…');var reader=new FileReader();reader.onload=function(ev){var base64=ev.target.result.split(',')[1];scanBarcodeWithAI(base64);};reader.readAsDataURL(file);e.target.value='';});
function resetBcModal(){document.getElementById('bc-step1').style.display='block';document.getElementById('bc-status').style.display='none';document.getElementById('bc-result').style.display='none';document.getElementById('bc-error').style.display='none';}
function showBcStatus(msg){document.getElementById('bc-step1').style.display='none';document.getElementById('bc-status').style.display='block';document.getElementById('bc-status').textContent=msg;document.getElementById('bc-result').style.display='none';document.getElementById('bc-error').style.display='none';}
function showBcError(msg){document.getElementById('bc-step1').style.display='none';document.getElementById('bc-status').style.display='block';document.getElementById('bc-status').textContent=msg;document.getElementById('bc-error').style.display='block';document.getElementById('bc-result').style.display='none';}
function scanBarcodeWithAI(base64){fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},{type:'text',text:'Read the barcode number in this image. Respond ONLY with the barcode digits, nothing else. If you cannot read a barcode, respond with NONE.'}]}]})}).then(function(r){return r.json();}).then(function(data){var code=(data.content&&data.content[0]&&data.content[0].text||'').trim().replace(/\D/g,'');if(!code||code.length<6){showBcError('Could not read barcode. Try a clearer photo, or type the food name.');return;}showBcStatus('Looking up product…');lookupBarcode(code);}).catch(function(){showBcError('Could not read image. Try again.');});}
function lookupBarcode(code){fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json').then(function(r){return r.json();}).then(function(data){if(data.status!==1||!data.product){showBcError('Product not found. Try typing the food name instead.');return;}var p=data.product;var n=p.nutriments||{};var name=p.product_name||p.brands||'Unknown product';var cal=parseFloat(n['energy-kcal_100g']||n['energy-kcal']||0);var protein=parseFloat(n['proteins_100g']||0);var carbs=parseFloat(n['carbohydrates_100g']||0);var fat=parseFloat(n['fat_100g']||0);var fiber=parseFloat(n['fiber_100g']||0);pendingFood={id:'bc'+Date.now(),name:name,per:100,unit:'g',cal:cal,protein:protein,carbs:carbs,fat:fat,fiber:fiber,aliases:[name.toLowerCase()]};document.getElementById('bc-name').textContent=name;document.getElementById('bc-macros').textContent=Math.round(cal)+' kcal · P:'+Math.round(protein)+'g C:'+Math.round(carbs)+'g F:'+Math.round(fat)+'g per 100g';document.getElementById('bc-amt').value='100';document.getElementById('bc-status').style.display='none';document.getElementById('bc-result').style.display='block';}).catch(function(){showBcError('Network error. Check connection and try again.');});}
document.getElementById('bc-log-btn').addEventListener('click',function(){if(!pendingFood)return;var amt=parseFloat(document.getElementById('bc-amt').value)||100;var unit=document.getElementById('bc-unit').value;library=library.filter(function(f){return f.name.toLowerCase()!==pendingFood.name.toLowerCase();});library.push(pendingFood);addToLog(pendingFood.name,amt,unit,pendingFood);pendingFood=null;barcodeModal.classList.remove('open');});
document.getElementById('bc-cancel').addEventListener('click',function(){pendingFood=null;barcodeModal.classList.remove('open');});
document.getElementById('bc-retry').addEventListener('click',function(){resetBcModal();});
document.getElementById('bc-close').addEventListener('click',function(){barcodeModal.classList.remove('open');});
var labelModal=document.getElementById('label-modal');
document.getElementById('label-btn').addEventListener('click',function(){labelModal.classList.add('open');resetLblModal();});
document.getElementById('lbl-photo-btn').addEventListener('click',function(){document.getElementById('label-file').click();});
document.getElementById('label-file').addEventListener('change',function(e){var file=e.target.files[0];if(!file)return;showLblStatus('Reading nutrition label…');var reader=new FileReader();reader.onload=function(ev){var base64=ev.target.result.split(',')[1];readNutritionLabel(base64);};reader.readAsDataURL(file);e.target.value='';});
function resetLblModal(){document.getElementById('lbl-step1').style.display='block';document.getElementById('lbl-status').style.display='none';document.getElementById('lbl-result').style.display='none';document.getElementById('lbl-error').style.display='none';}
function showLblStatus(msg){document.getElementById('lbl-step1').style.display='none';document.getElementById('lbl-status').style.display='block';document.getElementById('lbl-status').textContent=msg;document.getElementById('lbl-result').style.display='none';document.getElementById('lbl-error').style.display='none';}
function showLblError(msg){document.getElementById('lbl-step1').style.display='none';document.getElementById('lbl-status').style.display='block';document.getElementById('lbl-status').textContent=msg;document.getElementById('lbl-error').style.display='block';document.getElementById('lbl-result').style.display='none';}
function readNutritionLabel(base64){fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},{type:'text',text:'This is a nutrition facts label. Extract and respond ONLY with this JSON, no other text: {"name":"product name or Unknown","calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0} Numbers only for macros, per serving on the label.'}]}]})}).then(function(r){return r.json();}).then(function(data){var text=(data.content&&data.content[0]&&data.content[0].text||'').trim();try{var clean=text.replace(/```json|```/g,'').trim();var p=JSON.parse(clean);document.getElementById('lbl-name').value=p.name||'';document.getElementById('lbl-cal').value=p.calories||0;document.getElementById('lbl-protein').value=p.protein||0;document.getElementById('lbl-carbs').value=p.carbs||0;document.getElementById('lbl-fat').value=p.fat||0;document.getElementById('lbl-amt').value=100;document.getElementById('lbl-name-preview').textContent=p.name||'Food';document.getElementById('lbl-macros-preview').textContent=(p.calories||0)+' kcal · P:'+(p.protein||0)+'g C:'+(p.carbs||0)+'g F:'+(p.fat||0)+'g';document.getElementById('lbl-status').style.display='none';document.getElementById('lbl-result').style.display='block';}catch(err){showLblError('Could not read label. Try a clearer photo.');}}).catch(function(){showLblError('Network error. Check connection and try again.');});}
document.getElementById('lbl-log-btn').addEventListener('click',function(){var name=document.getElementById('lbl-name').value.trim()||'Food';var cal=parseFloat(document.getElementById('lbl-cal').value)||0;var protein=parseFloat(document.getElementById('lbl-protein').value)||0;var carbs=parseFloat(document.getElementById('lbl-carbs').value)||0;var fat=parseFloat(document.getElementById('lbl-fat').value)||0;var amt=parseFloat(document.getElementById('lbl-amt').value)||100;var unit=document.getElementById('lbl-unit').value;var food={id:'lbl'+Date.now(),name:name,per:100,unit:'g',cal:cal,protein:protein,carbs:carbs,fat:fat,fiber:0,aliases:[name.toLowerCase()]};library=library.filter(function(f){return f.name.toLowerCase()!==name.toLowerCase();});library.push(food);addToLog(name,amt,unit,food);labelModal.classList.remove('open');});
document.getElementById('lbl-cancel').addEventListener('click',function(){labelModal.classList.remove('open');});
document.getElementById('lbl-retry').addEventListener('click',function(){resetLblModal();});
document.getElementById('lbl-close').addEventListener('click',function(){labelModal.classList.remove('open');});
function calcTotals(){return log.reduce(function(t,e){return{cal:t.cal+e.cal,protein:t.protein+e.protein,carbs:t.carbs+e.carbs,fat:t.fat+e.fat,fiber:t.fiber+e.fiber};},{cal:0,protein:0,carbs:0,fat:0,fiber:0});}
function renderMacros(){var t=calcTotals();document.getElementById('ring-cal').textContent=Math.round(t.cal);document.getElementById('ring-rem').textContent=Math.max(0,Math.round(GOALS.cal-t.cal));var pct=Math.min(1,t.cal/GOALS.cal);document.getElementById('ring-arc').setAttribute('stroke-dashoffset',(175.9*(1-pct)).toFixed(1));document.getElementById('ring-arc').setAttribute('stroke',pct>=1?'#ff3b30':'#30d158');['protein','carbs','fat','fiber'].forEach(function(k){document.getElementById('m-'+k).textContent=Math.round(t[k]);document.getElementById('b-'+k).style.width=Math.min(100,Math.round(t[k]/GOALS[k]*100))+'%';});}
function renderLog(){var el=document.getElementById('log-list');if(!log.length){el.innerHTML='<div class="empty">Nothing logged yet</div>';return;}el.innerHTML='';log.slice().reverse().forEach(function(e){var row=document.createElement('div');row.className='entry';var mac=e.protein?Math.round(e.cal)+' kcal · P:'+Math.round(e.protein)+'g C:'+Math.round(e.carbs)+'g F:'+Math.round(e.fat)+'g':Math.round(e.cal)+' kcal';row.innerHTML='<span class="entry-name">'+e.name+'</span><span class="entry-amt">'+e.amt+' '+e.unit+'</span><span class="entry-cal">'+mac+'</span><button class="entry-del" data-id="'+e.id+'" aria-label="Remove">&times;</button>';el.appendChild(row);});el.querySelectorAll('.entry-del').forEach(function(btn){btn.addEventListener('click',function(){log=log.filter(function(e){return e.id!==+btn.dataset.id;});save();renderLog();renderMacros();});});}
document.getElementById('day-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
renderLog();renderMacros();
</script>
</body>
</html>
